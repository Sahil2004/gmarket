<h2 mat-dialog-title>Add bank account</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content class="flex! flex-col gap-3 min-w-[300px]">
    <mat-form-field><mat-label>Bank name</mat-label><input matInput formControlName="bank_name" /></mat-form-field>
    <mat-form-field><mat-label>Account number</mat-label><input matInput formControlName="account_number" /></mat-form-field>
    <mat-form-field><mat-label>IFSC</mat-label><input matInput formControlName="ifsc" /></mat-form-field>
    <mat-form-field><mat-label>Nickname (optional)</mat-label><input matInput formControlName="nickname" /></mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button type="button" matButton mat-dialog-close>Cancel</button>
    <button type="submit" matButton="filled" [disabled]="form.invalid || submitting()">Create</button>
  </mat-dialog-actions>
</form>
