<h2 mat-dialog-title>{{ title }}</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content class="flex! flex-col gap-4 min-w-[320px]">
    <p class="text-sm text-gray-500">{{ data.exchange }} · LTP {{ preview().ltp }}</p>

    <mat-button-toggle-group formControlName="product_type" class="w-full">
      <mat-button-toggle value="regular" class="flex-1">Regular</mat-button-toggle>
      <mat-button-toggle value="intraday" class="flex-1">Intraday</mat-button-toggle>
    </mat-button-toggle-group>

    <mat-button-toggle-group formControlName="order_type" class="w-full">
      <mat-button-toggle value="limit" class="flex-1">Limit</mat-button-toggle>
      <mat-button-toggle value="market" class="flex-1">Market</mat-button-toggle>
    </mat-button-toggle-group>

    <mat-form-field>
      <mat-label>Quantity</mat-label>
      <input matInput type="number" formControlName="quantity" min="1" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Limit price</mat-label>
      <input
        matInput
        type="number"
        formControlName="price"
        [disabled]="form.controls.order_type.value === 'market'"
      />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Stop loss (optional)</mat-label>
      <input matInput type="number" formControlName="stop_loss" />
    </mat-form-field>

    <div class="rounded border border-gray-700/50 p-3 text-sm space-y-1 tabular-nums">
      <div class="flex justify-between">
        <span class="text-gray-500">Order value</span>
        <span>{{ preview().order_value }}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-500">Margin required</span>
        <span>{{ preview().margin_required }}</span>
      </div>
      <div class="flex justify-between font-medium">
        <span class="text-gray-500">Available</span>
        <span>{{ preview().available }}</span>
      </div>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button type="button" matButton mat-dialog-close>Cancel</button>
    <button type="submit" matButton="filled" [disabled]="form.invalid || submitting()">
      Place {{ data.side === 'buy' ? 'Buy' : 'Sell' }}
    </button>
  </mat-dialog-actions>
</form>
